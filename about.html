<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Silah Logistics — About</title>
    <meta
      name="description"
      content="About Silah Logistics — a smart digital marketplace redefining how logistics connections are made, built on 20+ years of industry experience."
    />
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Kufi+Arabic:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <script>
      (function () {
        try {
          var l = localStorage.getItem('silah.lang');
          if (l !== 'ar' && l !== 'en') l = 'en';
          document.documentElement.lang = l;
          document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
        } catch (e) {}
      })();
    </script>
  </head>
  <body data-page="about">
    <div class="page-root">
      <header class="navbar" id="site-navbar"></header>
      <div class="shell">
        <aside class="sidebar" id="site-sidebar"></aside>
        <div class="shell__main">
          <main>
            <!-- ============================ HERO ============================ -->
            <section class="page-hero">
              <img class="page-hero__bg" src="assets/port-night.jpg" alt="" />
              <div class="page-hero__overlay"></div>
              <div class="container">
                <div class="page-hero__inner reveal">
                  <span class="eyebrow" data-i18n="about.hero.eyebrow"></span>
                  <h1 class="mt-4" data-i18n="about.hero.headline"></h1>
                  <div class="cta-block__actions">
                    <a class="btn btn--primary btn--lg" href="register.html">
                      <span data-i18n="about.hero.cta"></span>
                      <span data-icon="arrow-right" class="rtl-flip"></span>
                    </a>
                  </div>
                </div>
              </div>
            </section>

            <!-- ========================== WHO WE ARE ======================== -->
            <section class="section section--surface">
              <div class="container">
                <div class="split">
                  <div class="reveal reveal--right">
                    <span class="eyebrow" data-i18n="about.who.eyebrow"></span>
                    <h2 class="about__title mt-4" data-i18n="about.who.title"></h2>
                    <p class="about__body" data-i18n="about.who.body"></p>
                  </div>
                  <div class="reveal reveal--left">
                    <div class="media-frame">
                      <img src="assets/bg-ship.png" alt="" loading="lazy" />
                    </div>
                  </div>
                </div>
              </div>
            </section>

            <!-- =========================== VISION =========================== -->
            <section class="section section--white">
              <div class="container">
                <div class="section-head reveal">
                  <span class="eyebrow" data-i18n="about.vision.eyebrow"></span>
                  <h2 class="mt-4" data-i18n="about.vision.title"></h2>
                  <p class="section-head__subtitle" data-i18n="about.vision.body"></p>
                </div>
              </div>
            </section>

            <!-- ========================= WHAT WE DO ========================= -->
            <section class="section section--surface">
              <div class="container">
                <div class="split">
                  <div class="reveal reveal--right">
                    <div class="media-frame">
                      <img src="assets/bg-network.png" alt="" loading="lazy" />
                    </div>
                  </div>
                  <div class="reveal reveal--left">
                    <span class="eyebrow" data-i18n="about.what.eyebrow"></span>
                    <h2 class="about__title mt-4" data-i18n="about.what.title"></h2>
                    <p class="about__body" data-i18n="about.what.body"></p>
                  </div>
                </div>
              </div>
            </section>

            <!-- ======================== WHY IT MATTERS ====================== -->
            <section class="section section--white">
              <div class="container">
                <div class="section-head reveal">
                  <span class="eyebrow" data-i18n="about.why.eyebrow"></span>
                  <h2 class="mt-4" data-i18n="about.why.title"></h2>
                  <p class="section-head__subtitle" data-i18n="about.why.body"></p>
                </div>
              </div>
            </section>

            <!-- ========================= COMMITMENT ========================= -->
            <section class="section section--surface">
              <div class="container">
                <div class="section-head reveal">
                  <span class="eyebrow" data-i18n="about.commitment.eyebrow"></span>
                  <h2 class="mt-4" data-i18n="about.commitment.title"></h2>
                  <p class="section-head__subtitle" data-i18n="about.commitment.body"></p>
                </div>
              </div>
            </section>

            <!-- =========================== VALUES =========================== -->
            <section class="section section--white">
              <div class="container">
                <div class="section-head reveal">
                  <span class="eyebrow" data-i18n="about.values.eyebrow"></span>
                  <h2 class="mt-4" data-i18n="about.values.title"></h2>
                  <p class="section-head__subtitle" data-i18n="about.values.subtitle"></p>
                </div>
                <div class="grid grid-4 mt-12">
                  <div class="why-card reveal">
                    <span class="icon-box icon-box--navy-soft">
                      <span data-icon="zap" class="icon-lg"></span>
                    </span>
                    <h3 data-i18n="about.values.items.innovation.title"></h3>
                    <p data-i18n="about.values.items.innovation.desc"></p>
                  </div>
                  <div class="why-card reveal" data-delay="0.08">
                    <span class="icon-box icon-box--navy-soft">
                      <span data-icon="shield-check" class="icon-lg"></span>
                    </span>
                    <h3 data-i18n="about.values.items.transparency.title"></h3>
                    <p data-i18n="about.values.items.transparency.desc"></p>
                  </div>
                  <div class="why-card reveal" data-delay="0.16">
                    <span class="icon-box icon-box--navy-soft">
                      <span data-icon="bar-chart" class="icon-lg"></span>
                    </span>
                    <h3 data-i18n="about.values.items.performance.title"></h3>
                    <p data-i18n="about.values.items.performance.desc"></p>
                  </div>
                  <div class="why-card reveal" data-delay="0.24">
                    <span class="icon-box icon-box--navy-soft">
                      <span data-icon="headset" class="icon-lg"></span>
                    </span>
                    <h3 data-i18n="about.values.items.reliability.title"></h3>
                    <p data-i18n="about.values.items.reliability.desc"></p>
                  </div>
                </div>
              </div>
            </section>

            <!-- ========================== FINAL CTA ========================= -->
            <section class="section section--navy">
              <div class="container">
                <div class="cta-block reveal">
                  <h2 data-i18n="about.finalCta.title"></h2>
                  <p class="cta-block__subtitle" data-i18n="about.finalCta.subtitle"></p>
                  <div class="cta-block__actions">
                    <a class="btn btn--primary btn--lg" href="register.html">
                      <span data-i18n="about.finalCta.cta"></span>
                      <span data-icon="arrow-right" class="rtl-flip"></span>
                    </a>
                  </div>
                </div>
              </div>
            </section>
          </main>
          <footer class="footer" id="site-footer"></footer>
        </div>
      </div>
    </div>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <script src="js/icons.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/data.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/wizard.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
